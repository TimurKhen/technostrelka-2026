<div class="review">
  <div class="content">
    <div class="head">
      <h2>{{ review()?.username }}</h2>

      <div class="rating">
        <app-rating
          [currentStarInput]="review()?.mark!" [readOnly]="true">
        </app-rating>
      </div>
    </div>
    <p>{{ review()?.comment }}</p>
  </div>

  <p class="date">{{ review()?.created_at | timeAgoPipe }}</p>
</div>
