@if (isShow()) {
  <!-- Анимация затемнения фона -->
  <div class="popup-container"
       @simpleFade
       (click)="onClose()">

    <!-- Анимация самого окна -->
    <div class="popup"
        @simpleFade
        (click)="$event.stopPropagation()">
      <ng-content></ng-content>
    </div>

  </div>
}
